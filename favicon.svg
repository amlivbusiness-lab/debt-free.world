<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a4d2e"/>
  
  <!-- Globe: outer circle -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#4ade80" stroke-width="1.2"/>
  
  <!-- Globe: vertical center line -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#4ade80" stroke-width="0.7" opacity="0.6"/>
  
  <!-- Globe: horizontal center line -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#4ade80" stroke-width="0.7" opacity="0.6"/>
  
  <!-- Globe: equator curve top -->
  <path d="M6,16 Q16,10 26,16" fill="none" stroke="#4ade80" stroke-width="0.7" opacity="0.5"/>
  
  <!-- Globe: equator curve bottom -->
  <path d="M6,16 Q16,22 26,16" fill="none" stroke="#4ade80" stroke-width="0.7" opacity="0.5"/>

  <!-- Arrow: sweeping upward from bottom-left to top-right -->
  <path d="M9,22 Q14,16 21,10" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="16,8 21,10 23,15" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
