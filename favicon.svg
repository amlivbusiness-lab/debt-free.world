<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle: raikas tummanvihreä -->
  <circle cx="16" cy="16" r="16" fill="#166534"/>

  <!-- Globe: outer circle -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#86efac" stroke-width="1.3"/>

  <!-- Globe: vertical line -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#86efac" stroke-width="0.8" opacity="0.7"/>

  <!-- Globe: horizontal line -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#86efac" stroke-width="0.8" opacity="0.7"/>

  <!-- Globe: latitude curves -->
  <path d="M6,16 Q16,10 26,16" fill="none" stroke="#86efac" stroke-width="0.8" opacity="0.6"/>
  <path d="M6,16 Q16,22 26,16" fill="none" stroke="#86efac" stroke-width="0.8" opacity="0.6"/>

  <!-- Arrow: SUORA viiva vasemmalta alas oikealle ylös -->
  <line x1="10" y1="22" x2="22" y2="10" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Arrow head: kaksi suoraa viivaa -->
  <line x1="22" y1="10" x2="22" y2="15" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="17" y2="10" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
</svg>
